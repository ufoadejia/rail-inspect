services:
  # ===== PostgreSQL：工单、报告、用户等结构化数据 =====
  postgres:
    image: postgres:16-alpine
    container_name: rail-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rail123}
      POSTGRES_DB: ${POSTGRES_DB:-rail_defect}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rail}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== MinIO：探伤图片/视频对象存储（S3 兼容） =====
  minio:
    image: minio/minio:latest
    container_name: rail-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 控制台
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ===== Milvus 依赖：etcd =====
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: rail-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  # ===== Milvus 依赖：MinIO（Milvus 内部用，与上面的业务 MinIO 分开） =====
  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: rail-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9002"
    volumes:
      - milvus_minio_data:/minio_data

  # ===== Milvus：多模态向量库 =====
  milvus:
    image: milvusdb/milvus:v2.4.6
    container_name: rail-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"   # gRPC
      - "9091:9091"     # 健康检查/metrics
    depends_on:
      - etcd
      - milvus-minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  minio_data:
  etcd_data:
  milvus_minio_data:
